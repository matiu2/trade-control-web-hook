# === STAGING environment ===
# This branch (`staging`) deploys an isolated worker: its own name, KV
# namespace, and R2 bucket, separate from prod. Promotion to prod happens
# by merging a green-for-a-week staging into the `prod` branch (which
# carries its own prod-pointed wrangler.toml). See DEPLOYED.md.
name = "trade-control-web-hook-staging"
main = "build/worker/shim.mjs"
compatibility_date = "2026-03-13"
workers_dev = true

[build]
command = "cargo install -q worker-build && worker-build --release"

[observability]
enabled = true

[vars]

# STAGING KV namespace — distinct from dev/prod so state never collides.
# Create it and paste the printed id here (replace REPLACE_ME):
#   wrangler kv namespace create TRADE_CONTROL_KV_STAGING
[[kv_namespaces]]
binding = "TRADE_CONTROL_KV"
id = "4343d146bf244529a43fce11ced1587d"

# STAGING R2 bucket for per-request recording. Create with:
#   wrangler r2 bucket create trade-control-recording-staging
# The deploying API token needs "Workers R2 Storage: Edit". Absent
# binding is fail-soft (worker logs one line, skips recording).
[[r2_buckets]]
binding = "TRADE_CONTROL_R2"
bucket_name = "trade-control-recording-staging"

# Scheduled (cron) trigger. Fires the `scheduled` event in `src/cron.rs`.
# A SINGLE */15 trigger drives every job; each self-gates on `now`:
#   - every tick: session refresh + order sweep + spread-recovery watch
#   - NY-close edge (:00 tick of 21:00 UTC EDT / 22:00 UTC EST): open the
#     spread-blackout window. `is_ny_close_edge(now)` decides the season
#     in Rust; `now.minute() < 15` makes it once-per-close-hour.
#
# Why one cron, not three: Cloudflare caps an account at 5 cron triggers
# across ALL workers. Collapsing to one leaves headroom for the
# dev/staging/prod three-way split (3 envs × 1 cron = 3 ≤ 5).
#
# NOTE: must be the flat `crons = ["..."]` form, NOT `[[triggers.crons]]`
# with a `cron = "..."` inline value. The latter trips a wrangler bug that
# double-wraps the body as `[{"cron":{"cron":"..."}}]`, which the CF API
# rejects with code 10026 ("could not parse request body").
[triggers]
crons = ["*/15 * * * *"]
