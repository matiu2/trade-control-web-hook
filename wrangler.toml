# === DEV environment ===
# This branch (`main`) deploys the dev worker: its own name, KV namespace,
# and R2 bucket, separate from staging/prod. The staging branch carries a
# staging-pointed wrangler.toml; promotion to prod uses a prod-pointed one.
# See DEPLOYED.md for the branch -> environment model.
name = "trade-control-web-hook"
main = "build/worker/shim.mjs"
compatibility_date = "2026-03-13"
workers_dev = true

[build]
command = "cargo install -q worker-build && worker-build --release"

[observability]
enabled = true

[vars]

# DEV KV namespace — distinct from staging/prod so state never collides.
[[kv_namespaces]]
binding = "TRADE_CONTROL_KV"
id = "e4f27179248e451daf8cf68a98c47e5b"

# DEV R2 bucket for per-request recording (body + headers + response +
# logs). The worker writes one JSON object per intent request here; if this
# binding is absent the worker logs one line and skips recording (fail-soft
# — trading is unaffected). Create with:
#   wrangler r2 bucket create trade-control-recording
# The deploying API token needs "Workers R2 Storage: Edit".
[[r2_buckets]]
binding = "TRADE_CONTROL_R2"
bucket_name = "trade-control-recording"

# Scheduled (cron) trigger. Fires the `scheduled` event in `src/cron.rs`.
# A SINGLE */15 trigger drives every job; each self-gates on `now`:
#   - every tick: session refresh + order sweep + spread-recovery watch
#   - NY-close edge (:00 tick of 21:00 UTC EDT / 22:00 UTC EST): open the
#     spread-blackout window. `is_ny_close_edge(now)` decides the season
#     in Rust; `now.minute() < 15` makes it once-per-close-hour.
#
# Why one cron, not three: Cloudflare caps an account at 5 cron triggers
# across ALL workers. Collapsing to one leaves headroom for the
# dev/staging/prod three-way split (3 envs × 1 cron = 3 ≤ 5).
#
# NOTE: must be the flat `crons = ["..."]` form, NOT `[[triggers.crons]]`
# with a `cron = "..."` inline value. The latter trips a wrangler bug that
# double-wraps the body as `[{"cron":{"cron":"..."}}]`, which the CF API
# rejects with code 10026 ("could not parse request body").
[triggers]
crons = ["*/15 * * * *"]
