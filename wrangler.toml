name = "trade-control-web-hook"
main = "build/worker/shim.mjs"
compatibility_date = "2026-03-13"
workers_dev = true

[build]
command = "cargo install -q worker-build && worker-build --release"

[observability]
enabled = true

[vars]

# Bind a KV namespace named TRADE_CONTROL_KV before deploying. Create with:
#   wrangler kv:namespace create TRADE_CONTROL_KV
# and replace the id below with the one wrangler prints.
[[kv_namespaces]]
binding = "TRADE_CONTROL_KV"
id = "e4f27179248e451daf8cf68a98c47e5b"

# R2 bucket for per-request recording (body + headers + response + logs).
# The worker writes one JSON object per intent request here; if this
# binding is absent the worker logs one line and skips recording (fail-soft
# — trading is unaffected). Create the bucket with:
#   wrangler r2 bucket create trade-control-recording
# The deploying API token needs "Workers R2 Storage: Edit".
[[r2_buckets]]
binding = "TRADE_CONTROL_R2"
bucket_name = "trade-control-recording"

# Scheduled (cron) trigger. Fires the `scheduled` event in `src/cron.rs`
# which sweeps pending broker orders for expiry + SL-breach.
#
# NOTE: must be the flat `crons = ["..."]` form, NOT `[[triggers.crons]]`
# with a `cron = "..."` inline value. The latter trips a wrangler bug that
# double-wraps the body as `[{"cron":{"cron":"..."}}]`, which the CF API
# rejects with code 10026 ("could not parse request body").
#
# CF cron exprs are UTC-only and can't carry a timezone. New York's
# 17:00 close (the spread-blackout edge) is 21:00 UTC under EDT and
# 22:00 UTC under EST, so the daily NY-close-edge check fires at BOTH
# candidate minutes (21:05 and 22:05 UTC). On the wrong-season fire,
# `is_ny_close_edge(now)` returns false in Rust and the handler no-ops,
# so the one-hour DST shift is decided in code, not by the schedule.
[triggers]
crons = [
    "*/15 * * * *",   # order sweep + spread-recovery watcher (Cron 2)
    "5 21 * * *",     # NY-close edge under EDT (21:00 UTC + 5min) (Cron 1)
    "5 22 * * *",     # NY-close edge under EST (22:00 UTC + 5min) (Cron 1)
]
