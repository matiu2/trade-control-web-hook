[workspace]
resolver = "3"
members = ["broker-oanda", "cli", "conventions", "core", "trading-view", "tv-arm"]

[package]
name = "trade-control-web-hook"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
broker-oanda = { version = "0.1.0", path = "broker-oanda" }
broker-tradenation = { git = "https://github.com/matiu2/tradenation-api.git", tag = "broker-tradenation-v0.7.0", features = ["wasm_js"] }
tradenation-api = { git = "https://github.com/matiu2/tradenation-api.git", tag = "broker-tradenation-v0.7.0", features = ["wasm_js"] }
chrono = { version = "0.4.44", default-features = false, features = ["alloc", "serde"] }
hex = "0.4.3"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_yaml = "0.9.34"
trade-control-core = { path = "core" }
worker = "^0.8"
tracing = { version = "0.1.44", default-features = false, features = ["std"] }

[dev-dependencies]
pollster = "0.4.0"
