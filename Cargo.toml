[workspace]
resolver = "3"
members = []

[package]
name = "trade-control-web-hook"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
base64 = { version = "0.22.1", default-features = false, features = ["alloc"] }
chacha20poly1305 = { version = "0.10.1", default-features = false, features = ["alloc", "rand_core"] }
chrono = { version = "0.4.44", default-features = false, features = ["alloc", "serde"] }
clap = { version = "4.6.1", features = ["derive"], optional = true }
color-eyre = { version = "0.6.5", optional = true }
dialoguer = { version = "0.12.0", default-features = false, optional = true }
getrandom = { version = "0.4.2", optional = true }
hex = "0.4.3"
oanda-client = { version = "0.1.4", path = "../oanda-client", default-features = false, features = ["wasm_js"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "blocking"], optional = true }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_yaml = "0.9.34"
worker = "^0.8"

[features]
default = []
cli = ["dep:clap", "dep:color-eyre", "dep:getrandom", "dep:dialoguer", "dep:reqwest"]

[[bin]]
name = "encrypt-payload"
path = "src/bin/encrypt_payload.rs"
required-features = ["cli"]
